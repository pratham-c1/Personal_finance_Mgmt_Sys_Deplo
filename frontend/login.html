<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Personal Finance</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-bg">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">💰</div>
      <h1>Personal Finance</h1>
      <p>Management System</p>
    </div>
    <div id="loginError" class="alert alert-danger" style="display:none"></div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" id="loginBtn">
      <span>Sign In</span> →
    </button>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;">Default password: <code style="color:var(--accent)">admin123</code></p>
  </div>
</div>
<script>
async function doLogin() {
  const pw = document.getElementById('password').value;
  if (!pw) return;
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span>Signing in...</span>';
  btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      credentials: 'include',
      body: JSON.stringify({password: pw})
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/dashboard.html';
    } else {
      document.getElementById('loginError').style.display = 'flex';
      document.getElementById('loginError').textContent = data.message || 'Invalid password';
      btn.innerHTML = '<span>Sign In</span> →';
      btn.disabled = false;
    }
  } catch(e) {
    document.getElementById('loginError').style.display = 'flex';
    document.getElementById('loginError').textContent = 'Server error. Is Flask running?';
    btn.innerHTML = '<span>Sign In</span> →';
    btn.disabled = false;
  }
}
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
