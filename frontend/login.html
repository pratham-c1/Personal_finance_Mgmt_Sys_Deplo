<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Personal Finance</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-bg">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">💰</div>
      <h1>Personal Finance</h1>
      <p>Management System</p>
    </div>
    <div id="loginError" class="alert alert-danger" style="display:none"></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()" id="loginBtn">
      <span>Sign In</span> →
    </button>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;">
      Default: <code style="color:var(--accent)">admin</code> / <code style="color:var(--accent)">admin123</code>
    </p>
  </div>
</div>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const pw       = document.getElementById('password').value;
  const err      = document.getElementById('loginError');
  err.style.display = 'none';
  if (!username || !pw) {
    err.style.display = 'flex';
    err.textContent = 'Please enter both username and password';
    return;
  }
  const btn = document.getElementById('loginBtn');
  btn.innerHTML = '<span>Signing in...</span>';
  btn.disabled  = true;
  try {
    const res  = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({username, password: pw})
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/dashboard.html';
    } else {
      err.style.display  = 'flex';
      err.textContent    = data.message || 'Invalid username or password';
      btn.innerHTML      = '<span>Sign In</span> →';
      btn.disabled       = false;
    }
  } catch(e) {
    err.style.display = 'flex';
    err.textContent   = 'Server error. Please try again.';
    btn.innerHTML     = '<span>Sign In</span> →';
    btn.disabled      = false;
  }
}
document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
