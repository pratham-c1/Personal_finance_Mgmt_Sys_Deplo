<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Portfolio — Personal Finance</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"><div class="sidebar-header"><div class="sidebar-logo">💰</div><div class="sidebar-title">Personal Finance<span>Management System</span></div></div><nav class="sidebar-nav" id="sidebarNav"></nav><div class="sidebar-footer"><button class="btn btn-secondary btn-full btn-sm" onclick="logout()">🚪 Logout</button></div></aside>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">📉 Share Portfolio</div><div class="topbar-right"><div class="date-badge" id="bsDate"></div></div></div>
    <div class="page-body">
      <div class="page-header">
        <div class="page-header-title">📉 NEPSE Portfolio</div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Stock</button>
      </div>
      <div class="portfolio-summary">
        <div class="portfolio-stat"><div class="value" id="totalInv">Rs. 0</div><div class="label">Total Investment</div></div>
        <div class="portfolio-stat"><div class="value" id="totalCurrVal">Rs. 0</div><div class="label">Current Value</div></div>
        <div class="portfolio-stat"><div class="value" id="totalPL" style="color:var(--green)">Rs. 0</div><div class="label">Profit / Loss</div></div>
      </div>
      <div class="card" style="margin-bottom:20px">
        <div class="card-header"><span class="card-title">📊 Portfolio Allocation</span></div>
        <div class="card-body"><div class="chart-container"><canvas id="portfolioChart"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">📋 Holdings</span></div>
        <div class="table-container">
          <table class="data-table">
            <thead><tr><th>Symbol</th><th>Name</th><th>Qty</th><th>Buy Price</th><th>Current Price</th><th>Investment</th><th>Current Value</th><th>P/L</th><th>P/L %</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="10"><div class="loader"><div class="spinner"></div></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="modalTitle">Add Stock</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">Stock Symbol</label>
        <select id="fSymbol" class="form-control" onchange="onSymbolChange()"><option value="">Select Stock...</option></select>
      </div>
      <div class="form-group"><label class="form-label">Stock Name</label><input type="text" id="fName" class="form-control" readonly></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Quantity</label><input type="number" id="fQty" class="form-control" placeholder="0" oninput="calcPL()"></div>
        <div class="form-group"><label class="form-label">Purchase Price</label><input type="number" id="fPurchasePrice" class="form-control" placeholder="0" step="0.01" oninput="calcPL()"></div>
      </div>
      <div class="form-group"><label class="form-label">Current Price</label><input type="number" id="fCurrentPrice" class="form-control" placeholder="0" step="0.01" oninput="calcPL()"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Purchase Date BS</label><input type="text" id="fDateBs" class="form-control"></div>
        <div class="form-group"><label class="form-label">Purchase Date AD</label><input type="date" id="fDateAd" class="form-control"></div>
      </div>
      <div style="background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">
        <div><div style="font-size:11px;color:var(--text-muted)">INVESTMENT</div><div id="calcInv" style="font-family:Syne,sans-serif;color:var(--accent);font-size:16px;font-weight:700">Rs. 0</div></div>
        <div><div style="font-size:11px;color:var(--text-muted)">CURRENT VALUE</div><div id="calcCurrVal" style="font-family:Syne,sans-serif;color:var(--accent);font-size:16px;font-weight:700">Rs. 0</div></div>
        <div><div style="font-size:11px;color:var(--text-muted)">P/L</div><div id="calcPLDisp" style="font-family:Syne,sans-serif;font-size:16px;font-weight:700">Rs. 0</div></div>
      </div>
      <div class="form-group" style="margin-top:14px"><label class="form-label">Remarks</label><input type="text" id="fRemarks" class="form-control"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveRecord()">💾 Save</button></div>
  </div>
</div>
<script src="js/common.js"></script>
<script>
document.getElementById('sidebarNav').innerHTML = buildSidebar('share');
const bs = getCurrentBSDate();
document.getElementById('bsDate').textContent = `📅 ${bs.day} ${bs.month_name} ${bs.year} BS`;

async function loadStocks() {
  const stocks = await api('/api/share/stocks');
  const sel = document.getElementById('fSymbol');
  sel.innerHTML = '<option value="">Select Stock...</option>' + stocks.map(s=>`<option value="${s.value}" data-name="${s.label.split(' - ')[1]||''}">${s.label}</option>`).join('');
}

function onSymbolChange() {
  const sel = document.getElementById('fSymbol');
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('fName').value = opt.getAttribute('data-name') || '';
}

function calcPL() {
  const qty=parseInt(document.getElementById('fQty').value)||0;
  const buy=parseFloat(document.getElementById('fPurchasePrice').value)||0;
  const curr=parseFloat(document.getElementById('fCurrentPrice').value)||0;
  const inv=qty*buy, cv=qty*curr, pl=cv-inv;
  document.getElementById('calcInv').textContent=fmt(inv);
  document.getElementById('calcCurrVal').textContent=fmt(cv);
  const plEl=document.getElementById('calcPLDisp');
  plEl.textContent=fmt(pl);
  plEl.style.color=pl>=0?'var(--green)':'var(--red)';
}

async function loadData() {
  const data = await api('/api/share');
  const summary = await api('/api/share/summary');
  document.getElementById('totalInv').textContent=fmt(summary.total_investment);
  document.getElementById('totalCurrVal').textContent=fmt(summary.total_current_value);
  const plEl=document.getElementById('totalPL');
  plEl.textContent=fmt(summary.total_pl);
  plEl.style.color=summary.total_pl>=0?'var(--green)':'var(--red)';
  
  if (data.length) {
    const ctx=document.getElementById('portfolioChart').getContext('2d');
    if(window._portChart)window._portChart.destroy();
    window._portChart=new Chart(ctx,{type:'doughnut',data:{labels:data.map(d=>d.stock_symbol),datasets:[{data:data.map(d=>parseFloat(d.current_value)),backgroundColor:['#00d4ff','#7c3aed','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#34d399'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:'#94a3b8'}}}}});
  }
  
  const tbody=document.getElementById('tableBody');
  if(!data.length){tbody.innerHTML='<tr><td colspan="10"><div class="empty-state"><div class="empty-icon">📉</div><p>No stocks in portfolio</p></div></td></tr>';return;}
  tbody.innerHTML=data.map(r=>{
    const pl=parseFloat(r.profit_loss);
    const inv=parseFloat(r.investment)||1;
    const plPct=((pl/inv)*100).toFixed(2);
    return`<tr>
      <td><strong style="color:var(--accent)">${r.stock_symbol}</strong></td>
      <td style="font-size:12px;color:var(--text-muted)">${r.stock_name||'—'}</td>
      <td>${r.quantity}</td>
      <td>${fmt(r.purchase_price)}</td>
      <td>${fmt(r.current_price)}</td>
      <td>${fmt(r.investment)}</td>
      <td>${fmt(r.current_value)}</td>
      <td class="${pl>=0?'positive':'negative'}">${fmt(pl)}</td>
      <td><span class="badge ${pl>=0?'badge-green':'badge-red'}">${plPct}%</span></td>
      <td><button class="btn btn-warning btn-icon" onclick='editRecord(${JSON.stringify(r)})'>✏️</button> <button class="btn btn-danger btn-icon" onclick="deleteRecord(${r.id})">🗑️</button></td>
    </tr>`;}).join('');
}

function openModal(){document.getElementById('editId').value='';document.getElementById('modalTitle').textContent='Add Stock';document.getElementById('fSymbol').value='';document.getElementById('fName').value='';document.getElementById('fQty').value='';document.getElementById('fPurchasePrice').value='';document.getElementById('fCurrentPrice').value='';document.getElementById('fRemarks').value='';const b=getCurrentBSDate();document.getElementById('fDateBs').value=b.date_str;document.getElementById('fDateAd').value=b.date_ad;document.getElementById('calcInv').textContent='Rs. 0';document.getElementById('calcCurrVal').textContent='Rs. 0';document.getElementById('calcPLDisp').textContent='Rs. 0';document.getElementById('modalOverlay').classList.add('active');}
function editRecord(r){document.getElementById('editId').value=r.id;document.getElementById('modalTitle').textContent='Edit Stock';document.getElementById('fSymbol').value=r.stock_symbol;document.getElementById('fName').value=r.stock_name||'';document.getElementById('fQty').value=r.quantity;document.getElementById('fPurchasePrice').value=r.purchase_price;document.getElementById('fCurrentPrice').value=r.current_price;document.getElementById('fDateBs').value=r.purchase_date_bs||'';document.getElementById('fDateAd').value=r.purchase_date_ad||'';document.getElementById('fRemarks').value=r.remarks||'';calcPL();document.getElementById('modalOverlay').classList.add('active');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
async function saveRecord(){const id=document.getElementById('editId').value;const body={stock_symbol:document.getElementById('fSymbol').value,stock_name:document.getElementById('fName').value,quantity:parseInt(document.getElementById('fQty').value)||0,purchase_price:parseFloat(document.getElementById('fPurchasePrice').value)||0,current_price:parseFloat(document.getElementById('fCurrentPrice').value)||0,purchase_date_bs:document.getElementById('fDateBs').value,purchase_date_ad:document.getElementById('fDateAd').value||null,remarks:document.getElementById('fRemarks').value};const res=await api(id?`/api/share/${id}`:'/api/share',id?'PUT':'POST',body);if(res.success){showToast(res.message);closeModal();loadData();}else showToast(res.message||'Error','error');}
async function deleteRecord(id){if(!await confirm_delete())return;const res=await api(`/api/share/${id}`,'DELETE');if(res.success){showToast(res.message);loadData();}else showToast('Error','error');}

loadStocks();
loadData();
</script>
</body>
</html>
