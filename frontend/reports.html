<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — Personal Finance</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"><div class="sidebar-header"><div class="sidebar-logo">💰</div><div class="sidebar-title">Personal Finance<span>Management System</span></div></div><nav class="sidebar-nav" id="sidebarNav"></nav><div class="sidebar-footer"><button class="btn btn-secondary btn-full btn-sm" onclick="logout()">🚪 Logout</button></div></aside>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">📋 Reports</div><div class="topbar-right"><div class="date-badge" id="bsDate"></div></div></div>
    <div class="page-body">
      <div class="page-header">
        <div class="page-header-title">📋 Financial Reports</div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-success" onclick="exportExcel()">📊 Export Excel</button>
          <button class="btn btn-danger" onclick="exportPDF()">📄 Export PDF</button>
        </div>
      </div>

      <!-- Export Status -->
      <div id="exportMsg" style="display:none" class="alert alert-info" style="margin-bottom:16px"></div>

      <!-- Filter -->
      <div class="filter-bar" style="margin-bottom:20px">
        <div class="form-group"><label class="form-label">Year BS</label><input type="number" id="filterYear" class="form-control" placeholder="e.g. 2081" style="width:130px"></div>
        <div class="form-group"><label class="form-label">Month</label>
          <select id="filterMonth" class="form-control">
            <option value="">All Year</option><option value="1">Baisakh</option><option value="2">Jestha</option><option value="3">Ashadh</option><option value="4">Shrawan</option><option value="5">Bhadra</option><option value="6">Ashwin</option><option value="7">Kartik</option><option value="8">Mangsir</option><option value="9">Poush</option><option value="10">Magh</option><option value="11">Falgun</option><option value="12">Chaitra</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="loadReport()">📊 Generate Report</button>
      </div>

      <!-- Summary Cards -->
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-card income"><div class="stat-icon">💵</div><div class="stat-value" id="rptIncome">Rs. 0</div><div class="stat-label">Total Income</div></div>
        <div class="stat-card expense"><div class="stat-icon">💳</div><div class="stat-value" id="rptExpense">Rs. 0</div><div class="stat-label">Total Expense</div></div>
        <div class="stat-card savings"><div class="stat-icon">🏦</div><div class="stat-value" id="rptSavings">Rs. 0</div><div class="stat-label">Net Savings</div></div>
      </div>

      <!-- Charts -->
      <div class="charts-grid" style="margin-bottom:24px">
        <div class="card">
          <div class="card-header"><span class="card-title">💵 Income Breakdown</span></div>
          <div class="card-body">
            <div class="chart-container"><canvas id="incomeChart"></canvas></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">💳 Expense Breakdown</span></div>
          <div class="card-body">
            <div class="chart-container"><canvas id="expenseChart"></canvas></div>
          </div>
        </div>
      </div>

      <!-- Breakdown Tables side by side -->
      <div class="charts-grid">
        <div class="card">
          <div class="card-header"><span class="card-title">💵 Income by Category</span></div>
          <div class="table-container">
            <table class="data-table">
              <thead><tr><th>Category</th><th>Amount</th><th>% Share</th></tr></thead>
              <tbody id="incomeBreakdown"></tbody>
            </table>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">💳 Expense by Category</span></div>
          <div class="table-container">
            <table class="data-table">
              <thead><tr><th>Category</th><th>Amount</th><th>% Share</th></tr></thead>
              <tbody id="expenseBreakdown"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
document.getElementById('sidebarNav').innerHTML = buildSidebar('reports');
const bsNow = getCurrentBSDate();
document.getElementById('bsDate').textContent = `📅 ${bsNow.day} ${bsNow.month_name} ${bsNow.year} BS`;

const COLORS = ['#00d4ff','#7c3aed','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#34d399','#fbbf24','#f87171','#60a5fa','#a78bfa'];

async function loadReport() {
  const year = document.getElementById('filterYear').value;
  const month = document.getElementById('filterMonth').value;
  let url = '/api/reports/monthly?';
  if(year) url += `year=${year}&`;
  if(month) url += `month=${month}&`;

  const data = await api(url);
  document.getElementById('rptIncome').textContent = fmt(data.total_income);
  document.getElementById('rptExpense').textContent = fmt(data.total_expense);
  const sEl = document.getElementById('rptSavings');
  sEl.textContent = fmt(data.savings);
  sEl.style.color = data.savings >= 0 ? 'var(--green)' : 'var(--red)';

  // Income chart
  if (data.income_breakdown.length) {
    const ctx1 = document.getElementById('incomeChart').getContext('2d');
    if(window._iChart) window._iChart.destroy();
    window._iChart = new Chart(ctx1, {
      type:'doughnut',
      data:{ labels:data.income_breakdown.map(d=>d.category), datasets:[{ data:data.income_breakdown.map(d=>parseFloat(d.total)), backgroundColor:COLORS, borderWidth:0 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{ position:'right', labels:{ color:'#94a3b8', font:{ size:11 } } } } }
    });
  }

  // Expense chart
  if (data.expense_breakdown.length) {
    const ctx2 = document.getElementById('expenseChart').getContext('2d');
    if(window._eChart) window._eChart.destroy();
    window._eChart = new Chart(ctx2, {
      type:'doughnut',
      data:{ labels:data.expense_breakdown.map(d=>d.category), datasets:[{ data:data.expense_breakdown.map(d=>parseFloat(d.total)), backgroundColor:COLORS.slice(4), borderWidth:0 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{ position:'right', labels:{ color:'#94a3b8', font:{ size:11 } } } } }
    });
  }

  // Income breakdown table
  const incTotal = data.total_income || 1;
  document.getElementById('incomeBreakdown').innerHTML = data.income_breakdown.length
    ? data.income_breakdown.map(r=>`<tr>
        <td><span class="badge badge-green">${r.category}</span></td>
        <td class="positive">${fmt(r.total)}</td>
        <td><div style="display:flex;align-items:center;gap:8px">
          <div style="height:6px;background:var(--green);border-radius:3px;width:${Math.round(parseFloat(r.total)/incTotal*100)}%"></div>
          <span style="font-size:12px;color:var(--text-muted)">${(parseFloat(r.total)/incTotal*100).toFixed(1)}%</span>
        </div></td>
      </tr>`).join('')
    : '<tr><td colspan="3"><div class="empty-state"><p>No income data</p></div></td></tr>';

  // Expense breakdown table
  const expTotal = data.total_expense || 1;
  document.getElementById('expenseBreakdown').innerHTML = data.expense_breakdown.length
    ? data.expense_breakdown.map(r=>`<tr>
        <td><span class="badge badge-red">${r.category}</span></td>
        <td class="negative">${fmt(r.total)}</td>
        <td><div style="display:flex;align-items:center;gap:8px">
          <div style="height:6px;background:var(--red);border-radius:3px;width:${Math.round(parseFloat(r.total)/expTotal*100)}%"></div>
          <span style="font-size:12px;color:var(--text-muted)">${(parseFloat(r.total)/expTotal*100).toFixed(1)}%</span>
        </div></td>
      </tr>`).join('')
    : '<tr><td colspan="3"><div class="empty-state"><p>No expense data</p></div></td></tr>';
}

function showExportMsg(msg, type='info') {
  const el = document.getElementById('exportMsg');
  el.style.display = 'flex';
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  setTimeout(()=>el.style.display='none', 4000);
}

function exportExcel() {
  showExportMsg('⏳ Generating Excel report...');
  window.location.href = '/api/reports/export/excel';
  setTimeout(()=>showExportMsg('✅ Excel downloaded!','success'), 2000);
}

function exportPDF() {
  showExportMsg('⏳ Generating PDF report...');
  window.location.href = '/api/reports/export/pdf';
  setTimeout(()=>showExportMsg('✅ PDF downloaded!','success'), 2000);
}

loadReport();
</script>
</body>
</html>
