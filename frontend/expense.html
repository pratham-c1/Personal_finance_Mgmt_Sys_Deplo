<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenditure — Personal Finance</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"><div class="sidebar-header"><div class="sidebar-logo">💰</div><div class="sidebar-title">Personal Finance<span>Management System</span></div></div><nav class="sidebar-nav" id="sidebarNav"></nav><div class="sidebar-footer"><button class="btn btn-secondary btn-full btn-sm" onclick="logout()">🚪 Logout</button></div></aside>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">💳 Expenditure</div><div class="topbar-right"><div class="date-badge" id="bsDate"></div></div></div>
    <div class="page-body">
      <div class="page-header">
        <div class="page-header-title">💳 Expenditure Records</div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Expense</button>
      </div>
      <div class="charts-grid" style="margin-bottom:20px">
        <div class="card"><div class="card-header"><span class="card-title">🍕 Category Breakdown</span></div><div class="card-body"><div class="chart-container"><canvas id="catChart"></canvas></div></div></div>
        <div class="card"><div class="card-header"><span class="card-title">📅 Monthly Trend</span></div><div class="card-body"><div class="chart-container"><canvas id="monthChart"></canvas></div></div></div>
      </div>
      <div class="filter-bar">
        <div class="form-group"><label class="form-label">Year BS</label><input type="number" id="filterYear" class="form-control" placeholder="2081" style="width:120px"></div>
        <div class="form-group"><label class="form-label">Month</label>
          <select id="filterMonth" class="form-control"><option value="">All</option><option value="1">Baisakh</option><option value="2">Jestha</option><option value="3">Ashadh</option><option value="4">Shrawan</option><option value="5">Bhadra</option><option value="6">Ashwin</option><option value="7">Kartik</option><option value="8">Mangsir</option><option value="9">Poush</option><option value="10">Magh</option><option value="11">Falgun</option><option value="12">Chaitra</option></select>
        </div>
        <div class="form-group"><label class="form-label">Category</label>
          <select id="filterCat" class="form-control"><option value="">All</option><option>Petrol</option><option>Food</option><option>Bikes</option><option>Water</option><option>Health</option><option>Entertainment</option><option>Education</option><option>Tour/Travel</option><option>Clothes</option><option>Shoes</option><option>Gas</option><option>Electricity</option><option>Rent</option><option>Others</option></select>
        </div>
        <button class="btn btn-primary" onclick="loadData()">🔍 Filter</button>
        <button class="btn btn-secondary" onclick="clearFilter()">✕ Clear</button>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">📋 Expense Records</span><span class="positive" id="totalAmt">Rs. 0</span></div>
        <div class="table-container">
          <table class="data-table">
            <thead><tr><th>#</th><th>Date BS</th><th>Category</th><th>Particular</th><th>Qty</th><th>Rate</th><th>Amount</th><th>Remarks</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="9"><div class="loader"><div class="spinner"></div></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><span class="modal-title" id="modalTitle">Add Expense</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Date BS</label><input type="text" id="fDateBs" class="form-control"></div>
        <div class="form-group"><label class="form-label">Date AD</label><input type="date" id="fDateAd" class="form-control"></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Year BS</label><input type="number" id="fYear" class="form-control"></div>
        <div class="form-group"><label class="form-label">Month</label>
          <select id="fMonth" class="form-control"><option value="1">Baisakh</option><option value="2">Jestha</option><option value="3">Ashadh</option><option value="4">Shrawan</option><option value="5">Bhadra</option><option value="6">Ashwin</option><option value="7">Kartik</option><option value="8">Mangsir</option><option value="9">Poush</option><option value="10">Magh</option><option value="11">Falgun</option><option value="12">Chaitra</option></select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Category</label>
        <select id="fCategory" class="form-control"><option>Petrol</option><option>Food</option><option>Bikes</option><option>Water</option><option>Health</option><option>Entertainment</option><option>Education</option><option>Tour/Travel</option><option>Clothes</option><option>Shoes</option><option>Gas</option><option>Electricity</option><option>Rent</option><option>Others</option></select>
      </div>
      <div class="form-group"><label class="form-label">Particular</label><input type="text" id="fParticular" class="form-control" placeholder="Description"></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Quantity</label><input type="number" id="fQty" class="form-control" placeholder="1" value="1" step="0.001" oninput="calcAmount()"></div>
        <div class="form-group"><label class="form-label">Unit Rate</label><input type="number" id="fRate" class="form-control" placeholder="0" step="0.01" oninput="calcAmount()"></div>
      </div>
      <div class="form-group"><label class="form-label">Amount (auto-calculated)</label><input type="number" id="fAmount" class="form-control" placeholder="0" step="0.01"></div>
      <div class="form-group"><label class="form-label">Remarks</label><input type="text" id="fRemarks" class="form-control" placeholder="Optional"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveRecord()">💾 Save</button></div>
  </div>
</div>
<script src="js/common.js"></script>
<script>
document.getElementById('sidebarNav').innerHTML = buildSidebar('expense');
const bs = getCurrentBSDate();
document.getElementById('bsDate').textContent = `📅 ${bs.day} ${bs.month_name} ${bs.year} BS`;
prefillDates();

function prefillDates() {
  const bs = getCurrentBSDate();
  document.getElementById('fDateBs').value = bs.date_str;
  document.getElementById('fDateAd').value = bs.date_ad;
  document.getElementById('fYear').value = bs.year;
  document.getElementById('fMonth').value = bs.month;
}

function calcAmount() {
  const qty = parseFloat(document.getElementById('fQty').value)||0;
  const rate = parseFloat(document.getElementById('fRate').value)||0;
  if (qty && rate) document.getElementById('fAmount').value = (qty*rate).toFixed(2);
}

async function loadData() {
  const year = document.getElementById('filterYear').value;
  const month = document.getElementById('filterMonth').value;
  const cat = document.getElementById('filterCat').value;
  let url = '/api/expense?';
  if (year) url += `year=${year}&`;
  if (month) url += `month=${month}&`;
  if (cat) url += `category=${encodeURIComponent(cat)}&`;
  const data = await api(url);
  const total = data.reduce((s,r)=>s+parseFloat(r.amount),0);
  document.getElementById('totalAmt').textContent = fmt(total);
  const tbody = document.getElementById('tableBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">💳</div><p>No expense records</p></div></td></tr>'; return; }
  tbody.innerHTML = data.map((r,i)=>`<tr>
    <td>${i+1}</td><td>${r.date_bs}</td>
    <td><span class="badge badge-red">${r.category}</span></td>
    <td>${r.particular||'—'}</td>
    <td>${parseFloat(r.quantity||1).toFixed(2)}</td>
    <td>${fmt(r.rate||0)}</td>
    <td class="negative">${fmt(r.amount)}</td>
    <td style="color:var(--text-muted)">${r.remarks||'—'}</td>
    <td><button class="btn btn-warning btn-icon" onclick='editRecord(${JSON.stringify(r)})'>✏️</button> <button class="btn btn-danger btn-icon" onclick="deleteRecord(${r.id})">🗑️</button></td>
  </tr>`).join('');
  loadCharts();
}

async function loadCharts() {
  const cats = await api('/api/expense/summary');
  if (cats.length) {
    const ctx = document.getElementById('catChart').getContext('2d');
    if (window._catChart) window._catChart.destroy();
    window._catChart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: cats.map(c=>c.category), datasets: [{ data: cats.map(c=>parseFloat(c.total)), backgroundColor: ['#00d4ff','#ef4444','#10b981','#f59e0b','#7c3aed','#06b6d4','#8b5cf6','#34d399','#fbbf24','#f87171','#60a5fa','#a78bfa','#e879f9','#fb7185'], borderWidth:0 }] },
      options: { responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{ position:'right', labels:{ color:'#94a3b8', font:{ size:10 } } } } }
    });
  }
  const monthly = await api('/api/expense/monthly');
  if (monthly.length) {
    const top12 = monthly.slice(0,12).reverse();
    const ctx2 = document.getElementById('monthChart').getContext('2d');
    if (window._monthChart) window._monthChart.destroy();
    window._monthChart = new Chart(ctx2, {
      type: 'bar',
      data: { labels: top12.map(d=>d.month_bs), datasets: [{ label:'Expense', data:top12.map(d=>parseFloat(d.total)), backgroundColor:'rgba(239,68,68,0.7)', borderRadius:6 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ ticks:{ color:'#94a3b8' }, grid:{ color:'rgba(255,255,255,0.04)' } }, y:{ ticks:{ color:'#94a3b8', callback:v=>'Rs.'+v.toLocaleString('en-IN') }, grid:{ color:'rgba(255,255,255,0.04)' } } } }
    });
  }
}

function clearFilter() { document.getElementById('filterYear').value=''; document.getElementById('filterMonth').value=''; document.getElementById('filterCat').value=''; loadData(); }
function openModal() { document.getElementById('editId').value=''; document.getElementById('modalTitle').textContent='Add Expense'; document.getElementById('fParticular').value=''; document.getElementById('fQty').value=1; document.getElementById('fRate').value=''; document.getElementById('fAmount').value=''; document.getElementById('fRemarks').value=''; prefillDates(); document.getElementById('modalOverlay').classList.add('active'); }
function editRecord(r) {
  document.getElementById('editId').value=r.id; document.getElementById('modalTitle').textContent='Edit Expense';
  document.getElementById('fDateBs').value=r.date_bs; document.getElementById('fDateAd').value=r.date_ad;
  document.getElementById('fYear').value=r.year_bs; document.getElementById('fMonth').value=r.month_num;
  document.getElementById('fCategory').value=r.category; document.getElementById('fParticular').value=r.particular||'';
  document.getElementById('fQty').value=r.quantity||1; document.getElementById('fRate').value=r.rate||0;
  document.getElementById('fAmount').value=r.amount; document.getElementById('fRemarks').value=r.remarks||'';
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
async function saveRecord() {
  const id = document.getElementById('editId').value;
  const monthNum = parseInt(document.getElementById('fMonth').value);
  const body = { date_bs:document.getElementById('fDateBs').value, date_ad:document.getElementById('fDateAd').value, year_bs:parseInt(document.getElementById('fYear').value), month_bs:BS_MONTHS[monthNum-1], month_num:monthNum, category:document.getElementById('fCategory').value, particular:document.getElementById('fParticular').value, quantity:parseFloat(document.getElementById('fQty').value)||1, rate:parseFloat(document.getElementById('fRate').value)||0, amount:parseFloat(document.getElementById('fAmount').value)||0, remarks:document.getElementById('fRemarks').value };
  const res = await api(id?`/api/expense/${id}`:'/api/expense', id?'PUT':'POST', body);
  if(res.success){showToast(res.message);closeModal();loadData();}else showToast(res.message||'Error','error');
}
async function deleteRecord(id) { if(!await confirm_delete())return; const res=await api(`/api/expense/${id}`,'DELETE'); if(res.success){showToast(res.message);loadData();}else showToast(res.message||'Error','error'); }
loadData();
</script>
</body>
</html>
