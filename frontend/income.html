<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income — Personal Finance</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar"><div class="sidebar-header"><div class="sidebar-logo">💰</div><div class="sidebar-title">Personal Finance<span>Management System</span></div></div><nav class="sidebar-nav" id="sidebarNav"></nav><div class="sidebar-footer"><button class="btn btn-secondary btn-full btn-sm" onclick="logout()">🚪 Logout</button></div></aside>
  <div class="main-content">
    <div class="topbar"><div class="topbar-title">💵 Income</div><div class="topbar-right"><div class="date-badge" id="bsDate"></div></div></div>
    <div class="page-body">
      <div class="page-header">
        <div class="page-header-title">💵 Income Records <span id="totalLabel"></span></div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Income</button>
      </div>
      <div class="filter-bar">
        <div class="form-group"><label class="form-label">Year BS</label><input type="number" id="filterYear" class="form-control" placeholder="e.g. 2081" style="width:130px"></div>
        <div class="form-group"><label class="form-label">Month</label>
          <select id="filterMonth" class="form-control">
            <option value="">All Months</option>
            <option value="1">Baisakh</option><option value="2">Jestha</option><option value="3">Ashadh</option><option value="4">Shrawan</option><option value="5">Bhadra</option><option value="6">Ashwin</option><option value="7">Kartik</option><option value="8">Mangsir</option><option value="9">Poush</option><option value="10">Magh</option><option value="11">Falgun</option><option value="12">Chaitra</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Category</label>
          <select id="filterCat" class="form-control">
            <option value="">All</option>
            <option>Salary</option><option>Incentive</option><option>Share Market</option><option>Rent</option><option>Interest</option><option>Gift</option><option>Others</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="loadData()">🔍 Filter</button>
        <button class="btn btn-secondary" onclick="clearFilter()">✕ Clear</button>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">📋 Income Records</span>
          <div style="display:flex;gap:8px;">
            <div style="font-size:13px;color:var(--text-muted)">Total: <span id="totalAmt" class="positive" style="font-weight:600">Rs. 0</span></div>
          </div>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead><tr><th>#</th><th>Date BS</th><th>Date AD</th><th>Category</th><th>Amount</th><th>Remarks</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="7"><div class="loader"><div class="spinner"></div></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Income</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Date BS</label><input type="text" id="fDateBs" class="form-control" placeholder="2081-04-15"></div>
        <div class="form-group"><label class="form-label">Date AD</label><input type="date" id="fDateAd" class="form-control"></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label">Year BS</label><input type="number" id="fYear" class="form-control"></div>
        <div class="form-group"><label class="form-label">Month BS</label>
          <select id="fMonth" class="form-control">
            <option value="1">Baisakh</option><option value="2">Jestha</option><option value="3">Ashadh</option><option value="4">Shrawan</option><option value="5">Bhadra</option><option value="6">Ashwin</option><option value="7">Kartik</option><option value="8">Mangsir</option><option value="9">Poush</option><option value="10">Magh</option><option value="11">Falgun</option><option value="12">Chaitra</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Category</label>
        <select id="fCategory" class="form-control">
          <option>Salary</option><option>Incentive</option><option>Share Market</option><option>Rent</option><option>Interest</option><option>Gift</option><option>Others</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Amount (NPR)</label><input type="number" id="fAmount" class="form-control" placeholder="0.00" min="0" step="0.01"></div>
      <div class="form-group"><label class="form-label">Remarks</label><input type="text" id="fRemarks" class="form-control" placeholder="Optional notes"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecord()">💾 Save</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
document.getElementById('sidebarNav').innerHTML = buildSidebar('income');
const bs = getCurrentBSDate();
document.getElementById('bsDate').textContent = `📅 ${bs.day} ${bs.month_name} ${bs.year} BS`;
prefillDates();

function prefillDates() {
  const bs = getCurrentBSDate();
  document.getElementById('fDateBs').value = bs.date_str;
  document.getElementById('fDateAd').value = bs.date_ad;
  document.getElementById('fYear').value = bs.year;
  document.getElementById('fMonth').value = bs.month;
}

async function loadData() {
  const year = document.getElementById('filterYear').value;
  const month = document.getElementById('filterMonth').value;
  const cat = document.getElementById('filterCat').value;
  let url = '/api/income?';
  if (year) url += `year=${year}&`;
  if (month) url += `month=${month}&`;
  if (cat) url += `category=${encodeURIComponent(cat)}&`;
  const data = await api(url);
  const total = data.reduce((s,r)=>s+parseFloat(r.amount),0);
  document.getElementById('totalAmt').textContent = fmt(total);
  const tbody = document.getElementById('tableBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">💵</div><p>No income records found</p></div></td></tr>'; return; }
  tbody.innerHTML = data.map((r,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${r.date_bs}</td>
      <td>${r.date_ad}</td>
      <td><span class="badge badge-green">${r.category}</span></td>
      <td class="positive">${fmt(r.amount)}</td>
      <td style="color:var(--text-muted)">${r.remarks||'—'}</td>
      <td>
        <button class="btn btn-warning btn-icon" title="Edit" onclick='editRecord(${JSON.stringify(r)})'>✏️</button>
        <button class="btn btn-danger btn-icon" title="Delete" onclick="deleteRecord(${r.id})">🗑️</button>
      </td>
    </tr>`).join('');
}

function clearFilter() {
  document.getElementById('filterYear').value='';
  document.getElementById('filterMonth').value='';
  document.getElementById('filterCat').value='';
  loadData();
}

function openModal() {
  document.getElementById('editId').value='';
  document.getElementById('modalTitle').textContent='Add Income';
  document.getElementById('fAmount').value='';
  document.getElementById('fRemarks').value='';
  document.getElementById('fCategory').value='Salary';
  prefillDates();
  document.getElementById('modalOverlay').classList.add('active');
}

function editRecord(r) {
  document.getElementById('editId').value = r.id;
  document.getElementById('modalTitle').textContent = 'Edit Income';
  document.getElementById('fDateBs').value = r.date_bs;
  document.getElementById('fDateAd').value = r.date_ad;
  document.getElementById('fYear').value = r.year_bs;
  document.getElementById('fMonth').value = r.month_num;
  document.getElementById('fCategory').value = r.category;
  document.getElementById('fAmount').value = r.amount;
  document.getElementById('fRemarks').value = r.remarks || '';
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

async function saveRecord() {
  const id = document.getElementById('editId').value;
  const monthNum = parseInt(document.getElementById('fMonth').value);
  const body = {
    date_bs: document.getElementById('fDateBs').value,
    date_ad: document.getElementById('fDateAd').value,
    year_bs: parseInt(document.getElementById('fYear').value),
    month_bs: BS_MONTHS[monthNum-1],
    month_num: monthNum,
    category: document.getElementById('fCategory').value,
    amount: parseFloat(document.getElementById('fAmount').value) || 0,
    remarks: document.getElementById('fRemarks').value
  };
  const url = id ? `/api/income/${id}` : '/api/income';
  const method = id ? 'PUT' : 'POST';
  const res = await api(url, method, body);
  if (res.success) { showToast(res.message); closeModal(); loadData(); }
  else showToast(res.message || 'Error', 'error');
}

async function deleteRecord(id) {
  if (!await confirm_delete()) return;
  const res = await api(`/api/income/${id}`, 'DELETE');
  if (res.success) { showToast(res.message); loadData(); }
  else showToast(res.message || 'Error', 'error');
}

loadData();
</script>
</body>
</html>
