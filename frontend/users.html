<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users — Personal Finance</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="topbar-title">👥 Manage Users</div>
    </div>
    <div class="page-body">
    <div class="page-header">
      <div>
        <h1 class="page-title">👥 Manage Users</h1>
        <p class="page-subtitle">Create and manage user accounts</p>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Add User</button>
    </div>

    <div id="adminAlert" class="alert alert-danger" style="display:none;margin-bottom:16px;"></div>

    <div class="card">
      <div class="card-header"><h3 class="card-title">All Users</h3></div>
      <div class="table-container">
        <table class="data-table" id="usersTable">
          <thead>
            <tr>
              <th>ID</th><th>Username</th><th>Display Name</th><th>Role</th><th>Created</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div id="userModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Add New User</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="modalError" class="alert alert-danger" style="display:none;margin-bottom:12px;"></div>
      <div class="form-group">
        <label class="form-label">Username *</label>
        <input type="text" id="newUsername" class="form-control" placeholder="e.g. john (lowercase)">
      </div>
      <div class="form-group">
        <label class="form-label">Display Name</label>
        <input type="text" id="newDisplayName" class="form-control" placeholder="e.g. John Doe">
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input type="password" id="newPassword" class="form-control" placeholder="Enter password">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select id="newRole" class="form-control">
          <option value="user">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createUser()">Create User</button>
    </div>
  </div>
  </div><!-- end page-body -->
  </div><!-- end main-content -->
</div><!-- end app-layout -->

<!-- Reset Password Modal -->
<div id="resetModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Reset Password</h3>
      <button class="modal-close" onclick="closeResetModal()">×</button>
    </div>
    <div class="modal-body">
      <p style="color:var(--text-muted);margin-bottom:16px;">Resetting password for: <strong id="resetUsername"></strong></p>
      <div class="form-group">
        <label class="form-label">New Password *</label>
        <input type="password" id="resetPassword" class="form-control" placeholder="Enter new password">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeResetModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doResetPassword()">Reset Password</button>
    </div>
      <footer class="site-footer">
        © 2026 All Rights Reserved &nbsp;<span class="footer-divider">|</span>&nbsp;
        <strong style="color:var(--text)">Pratham Chaulagain</strong>
        <span class="footer-divider">|</span>
        <a href="mailto:prathamchaulagai1@gmail.com">prathamchaulagai1@gmail.com</a>
      </footer>
  </div>
</div>
<script src="js/common.js"></script>
<script>
let resetUserId = null;

async function init() {
  const auth = await api('/api/auth/check');
  if (!auth.logged_in) { window.location.href = '/login.html'; return; }
  if (auth.role !== 'admin') {
    document.getElementById('adminAlert').style.display = 'flex';
    document.getElementById('adminAlert').textContent = '⛔ Admin access required to view this page.';
    document.getElementById('usersBody').innerHTML = '';
    buildSidebar('users');
    return;
  }
  buildSidebar('users');
  loadUsers();
}

async function loadUsers() {
  const users = await api('/api/auth/users');
  const tbody = document.getElementById('usersBody');
  if (!users || users.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-muted)">No users found</td></tr>';
    return;
  }
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.id}</td>
      <td><strong>${u.username}</strong></td>
      <td>${u.user_name}</td>
      <td><span class="badge ${u.role === 'admin' ? 'badge-accent' : 'badge-muted'}">${u.role}</span></td>
      <td>${u.created_at.slice(0,10)}</td>
      <td>
        <button class="btn btn-sm btn-secondary" onclick="openResetModal(${u.id}, '${u.username}')">Reset PW</button>
        ${u.role !== 'admin' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id}, '${u.username}')">Delete</button>` : ''}
      </td>
    </tr>
  `).join('');
}

function openModal() {
  document.getElementById('userModal').style.display = 'flex';
  document.getElementById('modalError').style.display = 'none';
  document.getElementById('newUsername').value = '';
  document.getElementById('newDisplayName').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('newRole').value = 'user';
}
function closeModal() { document.getElementById('userModal').style.display = 'none'; }

async function createUser() {
  const username    = document.getElementById('newUsername').value.trim().toLowerCase();
  const user_name   = document.getElementById('newDisplayName').value.trim();
  const password    = document.getElementById('newPassword').value;
  const role        = document.getElementById('newRole').value;
  const errEl       = document.getElementById('modalError');
  errEl.style.display = 'none';
  if (!username || !password) {
    errEl.style.display = 'flex';
    errEl.textContent = 'Username and password are required';
    return;
  }
  const res = await api('/api/auth/users', 'POST', {username, user_name: user_name || username, password, role});
  if (res.success) {
    closeModal();
    showToast(`User "${username}" created successfully`, 'success');
    loadUsers();
  } else {
    errEl.style.display = 'flex';
    errEl.textContent = res.message || 'Failed to create user';
  }
}

async function deleteUser(id, username) {
  const confirmed = await confirm_delete(`Delete user "${username}"? All their data will remain in the database.`);
  if (!confirmed) return;
  const res = await api(`/api/auth/users/${id}`, 'DELETE');
  if (res.success) {
    showToast('User deleted', 'success');
    loadUsers();
  } else {
    showToast(res.message || 'Failed to delete user', 'error');
  }
}

function openResetModal(id, username) {
  resetUserId = id;
  document.getElementById('resetUsername').textContent = username;
  document.getElementById('resetPassword').value = '';
  document.getElementById('resetModal').style.display = 'flex';
}
function closeResetModal() { document.getElementById('resetModal').style.display = 'none'; resetUserId = null; }

async function doResetPassword() {
  const new_password = document.getElementById('resetPassword').value;
  if (!new_password) { showToast('Enter a new password', 'error'); return; }
  const res = await api(`/api/auth/users/${resetUserId}/reset-password`, 'POST', {new_password});
  if (res.success) {
    closeResetModal();
    showToast('Password reset successfully', 'success');
  } else {
    showToast(res.message || 'Failed to reset password', 'error');
  }
}

init();
</script>
</body>
</html>
